<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKStream - Premium Streaming</title>
    <style>
        :root {
            --bg-dark: #090B1A;
            --card-bg: rgba(26, 31, 61, 0.9);
            --accent-blue: #3D4FCC;
            --text-main: #E8EAFF;
            --text-dim: #6B7FBF;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glow {
            position: fixed;
            width: 40vw;
            height: 40vw;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.25;
        }
        .purple { background: #6A1B9A; top: -10%; left: -10%; }
        .blue { background: #3D4FCC; bottom: -10%; right: -10%; }

        .container {
            width: 90%;
            max-width: 450px;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 32px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .logo-box {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-box img {
            width: 70%;
            height: auto;
            border-radius: 12px;
        }

        h1 {
            font-size: 32px;
            margin: 10px 0;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .tagline {
            color: var(--text-dim);
            font-size: 15px;
            margin-bottom: 35px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .btn-apk {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 8px 20px rgba(61, 79, 204, 0.3);
        }

        .btn-apk:hover {
            background: #5162E6;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(61, 79, 204, 0.4);
        }

        .btn-play {
            background: transparent;
            color: var(--text-dim);
            border: 1.5px solid #2A3070;
        }

        .btn-play:hover {
            border-color: var(--text-dim);
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }

        .footer-info {
            margin-top: 25px;
            font-size: 12px;
            color: #4A5A9A;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="glow purple"></div>
    <div class="glow blue"></div>

    <div class="container">
        <div class="card">
            <div class="logo-box">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg4jYCUdROhsqZ3p03RJgFAAA-tHnkl8L9ytWMQiFhFX1mTak59xfv_DpXommvEWTBM6CB2TB7C0dxZ9IrW_XuzxRb0_Wu0U5c5yUloNWZ6vFQjYXukcHWoT32KHYXkMi43ipQ2q7Qj1sbAR03ML4nwPXePmoETjs0UAdDLEnCpvrPX2IDneqk9cwcLamU/s320/photo_2026-03-24%2023.24.14.jpeg" alt="AKStream Logo">
            </div>

            <h1>AKStream</h1>
            <p class="tagline">Stream anything, anywhere. Premium Experience.</p>

            <a href="https://play.google.com/store/apps/details?id=com.akstream.tt" class="btn btn-play" target="_blank">
                GET IT ON GOOGLE PLAY
            </a>

            <!-- Privacy Policy Button -->
            <a href="https://akstream.github.io/akstream/privacy_policy.html" class="btn btn-play" target="_blank">
               PRIVACY POLICY
            </a>

            <div class="footer-info">Version 1.0.0</div>
        </div>
    </div>

</body>
</html>
